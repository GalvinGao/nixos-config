patch:
  style/color_scheme: macos_dark
  style/color_scheme_dark: macos_dark
  style/text_orientation: horizontal
  style/candidate_list_layout: linear

  text_orientation: horizontal
  translucency: true
  inline_preedit: false
  corner_radius: 10
  hilited_corner_radius: 0
  border_height: 0
  border_width: 0
  line_spacing: 5
  spacing: 10
  font_face: 'Lucida Grande'
  font_point: 18
  label_font_point: 18

  preset_color_schemes:
    macos_dark:
      name: Mac仿原生暗色/macos_dark
      author: 一方
      back_color: 0x252a2e
      border_color: 0x050505
      text_color: 0x424242
      hilited_back_color: 0xD75A00
      hilited_candidate_text_color: 0xFFFFFF
      hilited_candidate_label_color: 0xFFFFFF
      hilited_comment_text_color: 0x999999
      hilited_text_color: 0x999999
      candidate_text_color: 0xe9e9ea
      comment_text_color: 0x999999
      horizontal: true
      inline_preedit: true
      label_color: 0x999999
      candidate_format: "%c\u2005%@"
      font_face: "PingFangSC"
      font_point: 17
      label_font_point: 13
      corner_radius: 16
      hilited_corner_radius: 15
      border_height: 4
      border_width: 0
      border_color_width: 0
